server:
    port: 8080
spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            routes:
            # INVENTARIO
              - id: inventario-service
                uri: http://localhost:8081
                predicates:
                    - Path=/productos/**

            # CLIENTES
              - id: clientes-service
                uri: http://localhost:8082
                predicates:
                    - Path=/clientes/**

            # BARBEROS
              - id: barbero-service
                uri: http://localhost:8083
                predicates:
                    - Path=/barberos/**

            # SUCURSALES
              - id: sucursal-service
                uri: http://localhost:8084
                predicates:
                    - Path=/sucursales/**

            # CITAS
              - id: cita-service
                uri: http://localhost:8085
                predicates:
                    - Path=/citas/**